<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private and Government — Tan (2026)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; background: #f9f9f7; color: #1a1a18;
    padding: 24px; max-width: 960px; margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
  h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }

  /* Layout */
  .wm-layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .wm-controls { flex: 0 0 200px; }
  .wm-canvas-wrap { flex: 1; min-width: 300px; }

  /* Controls */
  .wm-field { margin-bottom: 12px; }
  .wm-field label {
    display: block; font-size: 11px; color: #777; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  }
  select {
    font-size: 12px; padding: 5px 8px;
    border: 1px solid #ccc; border-radius: 6px;
    background: #fff; color: #222; width: 100%; cursor: pointer;
  }
  .sep { border-top: 1px solid #e5e5e3; padding-top: 11px; margin-bottom: 11px; }
  .wm-section-title {
    font-size: 11px; font-weight: 500; color: #888;
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .wm-slider-row { margin-bottom: 10px; }
  .wm-lbl { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 3px; }
  input[type=range] { width: 100%; height: 4px; accent-color: #378ADD; display: block; }

  /* Legend */
  .wm-legend-item { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; font-size: 12px; color: #444; white-space: nowrap; }
  .wm-legend-label { display: flex; align-items: baseline; gap: 0; }
  .wm-legend-label .sub { font-size: 11px; color: #888; margin-left: 6px; }
  .wm-legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  /* Canvas & readout */
  canvas { border: 1px solid #e0e0de; border-radius: 6px; width: 100%; max-width: 480px; display: block; }
</style>
</head>
<body>

<h1>Welfare comparison: W<sup>P</sup> vs W<sup>G</sup></h1>

<div class="wm-layout">

  <div class="wm-controls">

    <div class="wm-field">
      <label>x-axis</label>
      <select id="xax">
        <option value="R" selected>R (risky return)</option>
        <option value="beta">β (patience share)</option>
        <option value="r">r (fire-sale price)</option>
        <option value="eta">η (liquidity value)</option>
      </select>
    </div>

    <div class="wm-field">
      <label>y-axis</label>
      <select id="yax">
        <option value="beta" selected>β (patience share)</option>
        <option value="R">R (risky return)</option>
        <option value="r">r (fire-sale price)</option>
        <option value="eta">η (liquidity value)</option>
      </select>
    </div>

    <div class="sep">
      <div class="wm-section-title">Fixed parameters</div>
      <div id="sldrs"></div>
      <div class="wm-slider-row">
        <div class="wm-lbl"><span>r<sub>b</sub> (outside option)</span><span id="lb_rb">0.60</span></div>
        <input type="range" id="sl_rb" min="0.1" max="1.2" step="0.02" value="0.60">
      </div>
      <div class="wm-slider-row">
        <div class="wm-lbl"><span>r<sub>g</sub> (upper bound)</span><span id="lb_rg">1.00</span></div>
        <input type="range" id="sl_rg" min="0.5" max="2.0" step="0.02" value="1.00">
      </div>
    </div>

    <div class="sep">
      <div class="wm-section-title">Legend</div>
      <div class="wm-legend-item">
        <div class="wm-legend-swatch" style="background:#378ADD"></div>
        <span>𝒲<sup>P</sup> &gt; 𝒲<sup>G</sup></span>
        <span style="color:#bbb;font-size:11px">B-interior</span>
      </div>
      <div class="wm-legend-item">
        <div class="wm-legend-swatch" style="background:#EF9F27"></div>
        <span>𝒲<sup>G</sup> &gt; 𝒲<sup>P</sup></span>
        <span style="color:#bbb;font-size:11px">B-constrained</span>
      </div>
      <div class="wm-legend-item">
        <div class="wm-legend-swatch" style="background:#888780"></div>
        <span>𝒲<sup>P</sup> = 𝒲<sup>G</sup></span>
        <span style="color:#bbb;font-size:11px">chose A</span>
      </div>
      <div class="wm-legend-item">
        <div class="wm-legend-swatch" style="background:#D3D1C7"></div>
        <span>Infeasible</span>
      </div>
    </div>

  </div>

  <div class="wm-canvas-wrap">
    <canvas id="ph" width="480" height="380"></canvas>
  </div>

</div>

<script>
const WM_PAX = {
  beta: { label: 'β', min: 0.03, max: 0.97, step: 0.01, def: 0.40 },
  R:    { label: 'R', min: 1.05, max: 5.00, step: 0.05, def: 2.50 },
  r:    { label: 'r', min: 0.01, max: 0.99, step: 0.01, def: 0.20 },
  eta:  { label: 'η', min: 0.00, max: 0.90, step: 0.01, def: 0.10 }
};
const WM_F = { beta: 0.40, R: 2.50, r: 0.20, eta: 0.10, rb: 0.60, rg: 1.00 };

function wm_solve(beta, R, r, eta, rb, rg) {
  if (r >= 1 || R <= 1 || beta <= 0 || beta >= 1 || rb >= rg) return null;
  const aA = 1 + eta / 2 - rb;
  if (aA <= 0) return null;
  const CA = r * (R - 1) * (R - 1) / (2 * (R - r));
  if (CA <= 0) return null;
  const aB = 1 + eta / 2 - (1 - beta - eta) / (2 * beta) - rb;
  const sbar_raw = (1 - beta - eta) * r / (beta * (R - r));
  const sbar = Math.min(Math.max(sbar_raw, 0), 0.99999);

  /* Solution A branches */
  const shatA = 0.5 - aA / (2 * CA);
  let sigmaA, PiA;
  if (shatA <= 0) {
    sigmaA = 0; PiA = aA * CA / (rg - rb);
  } else if (shatA < sbar) {
    sigmaA = shatA; PiA = (CA + aA) * (CA + aA) / (4 * (rg - rb));
  } else {
    sigmaA = sbar; PiA = (aA + CA * sbar) * (1 - sbar) * CA / (rg - rb);
  }
  PiA = Math.max(0, PiA);
  const euA = aA + sigmaA * CA;
  if (euA <= 0) return null;
  const WG = (euA / (rg - rb)) * (1 + eta / 2 + CA);

  /* Solution B — only if sbar_raw < 1 */
  const wBrb = aB + (R - 1);
  let sigmaB, PiB;
  if (sbar_raw > 1 || wBrb <= 0) {
    sigmaB = null; PiB = 0;
  } else {
    const shatB = 0.5 - aB / (2 * (R - 1));
    if (shatB < sbar) {
      sigmaB = sbar;
      PiB = Math.max(0, (aB + (R - 1) * sbar) * (1 - sbar) * (R - 1) / (rg - rb));
    } else if (shatB <= 1) {
      sigmaB = shatB; PiB = wBrb * wBrb / (4 * (rg - rb));
    } else {
      sigmaB = 1; PiB = 0;
    }
  }

  /* Global choice */
  if (PiB <= PiA) return { reg: 0, WP: WG, WG, sigmaA, sigmaB, PiA, PiB, CA, aA, aB, sbar };
  const euB = aB + sigmaB * (R - 1);
  if (euB <= 0) return { reg: 0, WP: WG, WG, sigmaA, sigmaB, PiA, PiB, CA, aA, aB, sbar };
  const wB = 1 + eta / 2 + (R - 1) - (1 - beta - eta) / (2 * beta);
  const WP = (euB / (rg - rb)) * wB;
  const reg = WP > WG + 1e-9 ? 1 : (WP < WG - 1e-9 ? -1 : 0);
  return { reg, WP, WG, sigmaA, sigmaB, PiA, PiB, CA, aA, aB, sbar };
}


function wmAxes() {
  return { xk: document.getElementById('xax').value, yk: document.getElementById('yax').value };
}

function buildSlidersWM() {
  const { xk, yk } = wmAxes();
  const d = document.getElementById('sldrs');
  d.innerHTML = '';
  ['beta', 'R', 'r', 'eta'].forEach(k => {
    if (k === xk || k === yk) return;
    const p = WM_PAX[k];
    const row = document.createElement('div');
    row.className = 'wm-slider-row';
    row.innerHTML =
      `<div class="wm-lbl"><span>${p.label}</span><span id="lb_${k}">${WM_F[k].toFixed(2)}</span></div>` +
      `<input type="range" id="sl_${k}" min="${p.min}" max="${p.max}" step="${p.step}" value="${WM_F[k]}">`;
    d.appendChild(row);
    row.querySelector('input').addEventListener('input', e => {
      WM_F[k] = parseFloat(e.target.value);
      document.getElementById('lb_' + k).textContent = WM_F[k].toFixed(2);
      drawWelfareMap();
    });
  });
}

function drawWelfareMap() {
  const { xk, yk } = wmAxes();
  const cv = document.getElementById('ph');
  const ctx = cv.getContext('2d');
  const CW = cv.width, CH = cv.height;
  const ml = 48, mb = 42, mt = 22, mr = 22;
  const pw = CW - ml - mr, ph = CH - mt - mb;
  const px = WM_PAX[xk], py = WM_PAX[yk];

  ctx.clearRect(0, 0, CW, CH);

  const img = ctx.createImageData(pw, ph);
  /* reg: 1=blue(WP>WG)  -1=amber(WG>WP)  0=grey(tie/A)  null=infeasible */
  const COLS = { null:[200,198,190,160], '-1':[239,159,39,215], '0':[136,135,128,185], '1':[55,138,221,215] };

  for (let j = 0; j < ph; j++) {
    for (let i = 0; i < pw; i++) {
      const xv = px.min + (i / (pw - 1)) * (px.max - px.min);
      const yv = py.max - (j / (ph - 1)) * (py.max - py.min);
      const a = { ...WM_F, [xk]: xv, [yk]: yv };
      const s = wm_solve(a.beta, a.R, a.r, a.eta, a.rb, a.rg);
      const c = s === null ? COLS['null'] : COLS[String(s.reg)];
      const idx = (j * pw + i) * 4;
      img.data[idx]=c[0]; img.data[idx+1]=c[1]; img.data[idx+2]=c[2]; img.data[idx+3]=c[3];
    }
  }
  const tmp = document.createElement('canvas');
  tmp.width = pw; tmp.height = ph;
  tmp.getContext('2d').putImageData(img, 0, 0);
  ctx.drawImage(tmp, ml, mt);

  /* Grid */
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 0.5;
  [1,2,3,4].forEach(i => {
    ctx.beginPath(); ctx.moveTo(ml+i/4*pw, mt); ctx.lineTo(ml+i/4*pw, mt+ph); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ml, mt+i/4*ph); ctx.lineTo(ml+pw, mt+i/4*ph); ctx.stroke();
  });
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
  ctx.strokeRect(ml, mt, pw, ph);

  /* BW boundary: w^B = w^G */
  {
    const bwPts = [];
    for (let i = 0; i < pw; i++) {
      const xv = px.min + (i / (pw - 1)) * (px.max - px.min);
      let prev = null, crossJ = null;
      for (let j = 0; j < ph; j++) {
        const yv = py.max - (j / (ph - 1)) * (py.max - py.min);
        const a = { ...WM_F, [xk]: xv, [yk]: yv };
        if (a.beta <= 0 || a.beta >= 1 || a.R <= 1 || a.r >= 1 ||
            a.R <= a.r || 1 - a.beta - a.eta <= 0) { prev = null; continue; }
        const CAb = a.r * (a.R - 1) * (a.R - 1) / (2 * (a.R - a.r));
        const diff = (a.R - 1) - (1 - a.beta - a.eta) / (2 * a.beta) - CAb;
        if (prev !== null && prev * diff < 0) { crossJ = j - diff / (diff - prev); break; }
        prev = diff;
      }
      bwPts.push(crossJ !== null ? { x: ml + i, y: mt + crossJ } : null);
    }
    ctx.save();
    ctx.setLineDash([5, 4]); ctx.lineCap = 'round';
    const drawBW = (style, lw) => {
      ctx.strokeStyle = style; ctx.lineWidth = lw;
      ctx.beginPath(); let on = false;
      bwPts.forEach(p => {
        if (!p) { on = false; return; }
        on ? ctx.lineTo(p.x, p.y) : (ctx.moveTo(p.x, p.y), (on = true));
      });
      ctx.stroke();
    };
    drawBW('rgba(0,0,0,0.3)', 3);
    drawBW('rgba(255,255,255,0.95)', 1.5);
    ctx.restore();
  }

  /* Axis tick labels */
  ctx.fillStyle = 'rgba(55,55,55,0.9)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    const xv = px.min + i/5 * (px.max - px.min);
    ctx.fillText(xv.toFixed(xv < 2 ? 2 : 1), ml + i/5*pw, mt+ph+17);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const yv = py.min + i/5 * (py.max - py.min);
    ctx.fillText(yv.toFixed(yv < 2 ? 2 : 1), ml-5, mt+ph - i/5*ph + 4);
  }
  ctx.fillStyle = 'rgba(35,35,35,0.9)'; ctx.font = '500 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(px.label, ml+pw/2, CH-6);
  ctx.save(); ctx.translate(12, mt+ph/2); ctx.rotate(-Math.PI/2); ctx.fillText(py.label, 0, 0); ctx.restore();

}

function onAxisChangeWM() {
  const { xk, yk } = wmAxes();
  if (xk === yk) {
    const other = ['beta','R','r','eta'].find(v => v !== xk);
    document.getElementById(xk === 'R' ? 'yax' : 'xax').value = other;
  }
  buildSlidersWM(); drawWelfareMap();
}
document.getElementById('xax').addEventListener('change', onAxisChangeWM);
document.getElementById('yax').addEventListener('change', onAxisChangeWM);

['rb','rg'].forEach(k => {
  document.getElementById('sl_' + k).addEventListener('input', e => {
    WM_F[k] = parseFloat(e.target.value);
    document.getElementById('lb_' + k).textContent = WM_F[k].toFixed(2);
    drawWelfareMap();
  });
});

buildSlidersWM();
drawWelfareMap();
</script>
</body>
</html>
