<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Private and Government — Tan (2026)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; background: #f9f9f7; color: #1a1a18;
    padding: 24px; max-width: 960px; margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
  h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }

  /* Layout */
  .wm-layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .wm-controls { flex: 0 0 200px; }
  .wm-canvas-wrap { flex: 1; min-width: 300px; }

  /* Controls */
  .wm-field { margin-bottom: 12px; }
  .wm-field label {
    display: block; font-size: 11px; color: #777; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  }
  select {
    font-size: 12px; padding: 5px 8px;
    border: 1px solid #ccc; border-radius: 6px;
    background: #fff; color: #222; width: 100%; cursor: pointer;
  }
  .sep { border-top: 1px solid #e5e5e3; padding-top: 11px; margin-bottom: 11px; }
  .wm-section-title {
    font-size: 11px; font-weight: 500; color: #888;
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .wm-slider-row { margin-bottom: 10px; }
  .wm-lbl { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 3px; }
  input[type=range] { width: 100%; height: 4px; accent-color: #378ADD; display: block; }

  /* Legend */
  .wm-legend-item { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; font-size: 12px; color: #444; white-space: nowrap; }
  .wm-legend-label { display: flex; align-items: baseline; gap: 0; }
  .wm-legend-label .sub { font-size: 11px; color: #888; margin-left: 6px; }
  .wm-legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .wm-legend-dash {
    width: 20px; height: 2px; flex-shrink: 0; margin: 2px 0;
  }
  /* Canvas & readout */
  canvas { border: 1px solid #e0e0de; border-radius: 6px; width: 100%; max-width: 480px; display: block; cursor: crosshair; }

  /* Click-to-inspect tooltip */
  #wm-tip {
    position: fixed; background: #fff; border: 1px solid #ddd;
    border-radius: 9px; padding: 11px 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.13);
    font-size: 12px; z-index: 100; min-width: 200px;
    pointer-events: none; line-height: 1.6; display: none;
  }
  #wm-tip .tip-close { pointer-events: all; cursor: pointer; float: right; color: #bbb; font-size: 14px; line-height: 1; margin: -1px -3px 0 8px; }
  #wm-tip .tip-close:hover { color: #888; }
  #wm-tip .tip-regime { font-size: 14px; font-weight: 600; margin-bottom: 1px; }
  #wm-tip .tip-desc { font-size: 11px; color: #999; margin-bottom: 6px; }
  #wm-tip hr { border: none; border-top: 1px solid #eee; margin: 6px 0; }
  #wm-tip table { border-collapse: collapse; width: 100%; }
  #wm-tip .kl { color: #888; padding-right: 2px; white-space: nowrap; }
  #wm-tip .kv { font-weight: 500; padding-right: 8px; }
  #wm-tip .tip-note { font-size: 11px; margin-top: 5px; }
</style>

<script>
const WM_PAX = {
  beta: { label: 'β', min: 0.03, max: 0.97, step: 0.01, def: 0.40 },
  R:    { label: 'R', min: 1.05, max: 5.00, step: 0.05, def: 2.50 },
  r:    { label: 'r', min: 0.01, max: 0.99, step: 0.01, def: 0.20 },
  eta:  { label: 'η', min: 0.00, max: 0.90, step: 0.01, def: 0.10 }
};
/* A6 requires r_b >= 1, r_g > r_b — defaults reflect this */
const WM_F = { beta: 0.40, R: 2.50, r: 0.20, eta: 0.10, rb: 1.00, rg: 1.50 };

function wm_solve(beta, R, r, eta, rb, rg) {
  if (r >= 1 || R <= 1 || beta <= 0 || beta >= 1 || rb >= rg) return null;
  const aA = 1 + eta / 2 - rb;  /* can be ≤ 0 under A6 when η is small */
  const CA = r * (R - 1) * (R - 1) / (2 * (R - r));
  if (CA <= 0) return null;
  /* Infeasible only if even full carry (σ→1) yields no participation */
  if (aA + CA <= 0) return null;
  const aB = 1 + eta / 2 - (1 - beta - eta) / (2 * beta) - rb;
  const sbar_raw = (1 - beta - eta) * r / (beta * (R - r));
  const sbar = Math.min(Math.max(sbar_raw, 0), 0.99999);

  /* Solution A branches */
  const shatA = 0.5 - aA / (2 * CA);
  const xtilde = r * (R - 1) / (R - r);
  let sigmaA, PiA;
  if (shatA <= 0) {
    sigmaA = 0; PiA = aA * CA / (rg - rb);
  } else if (shatA < sbar) {
    sigmaA = shatA; PiA = (CA + aA) * (CA + aA) / (4 * (rg - rb));
  } else {
    sigmaA = sbar; PiA = (aA + CA * sbar) * (1 - sbar) * CA / (rg - rb);
  }
  PiA = Math.max(0, PiA);
  const euA = aA + sigmaA * CA;
  if (euA <= 0) return null;
  const WG = (euA / (rg - rb)) * (1 + eta / 2 + CA);

  /* Solution B — only if sbar_raw < 1 */
  const wBrb = aB + (R - 1);
  let sigmaB, shatBval, PiB;
  if (sbar_raw > 1 || wBrb <= 0) {
    sigmaB = null; shatBval = null; PiB = 0;
  } else {
    shatBval = 0.5 - aB / (2 * (R - 1));
    if (shatBval < sbar) {
      sigmaB = sbar;
      PiB = Math.max(0, (aB + (R - 1) * sbar) * (1 - sbar) * (R - 1) / (rg - rb));
    } else if (shatBval <= 1) {
      sigmaB = shatBval; PiB = wBrb * wBrb / (4 * (rg - rb));
    } else {
      sigmaB = 1; PiB = 0;
    }
  }

  /* Commitment benchmark (Regime II with commitment, §5) */
  const wC_den = 1 - beta - eta;
  const xC    = wC_den > 0 ? beta * (R - 1) / wC_den : Infinity;
  const wC    = (xC < 1 && wC_den > 0)
                ? 1 + eta / 2 + beta * (R - 1) * (R - 1) / (2 * wC_den)
                : 1 + eta / 2 + (R - 1) - (1 - beta - eta) / (2 * beta);
  const WC    = wC > rb ? (wC - rb) * wC / (2 * (rg - rb)) : 0;

  /* Government non-accommodation (Appendix GA, r ≤ δ^G) */
  const wGno  = 1 + eta / 2 + (R - 1) - (1 - beta) / 2;
  const WGno  = wGno > rb ? (wGno - rb) * wGno / (2 * (rg - rb)) : 0;

  /* Regime classification */
  let regime;
  if (PiB <= PiA) {
    regime = shatA <= 0 ? 'I-a' : shatA < sbar ? 'I-b' : 'I-c';
    return { reg: 0, WP: WG, WG, WC, wC, xC, wGno, WGno,
             sigmaA, sigmaB, PiA, PiB, CA, aA, aB, sbar,
             regime, shatA, shatBval, xtilde };
  }
  const euB = aB + sigmaB * (R - 1);
  if (euB <= 0) {
    regime = shatA <= 0 ? 'I-a' : shatA < sbar ? 'I-b' : 'I-c';
    return { reg: 0, WP: WG, WG, WC, wC, xC, wGno, WGno,
             sigmaA, sigmaB, PiA, PiB, CA, aA, aB, sbar,
             regime, shatA, shatBval, xtilde };
  }
  const wB = 1 + eta / 2 + (R - 1) - (1 - beta - eta) / (2 * beta);
  const WP = (euB / (rg - rb)) * wB;
  const reg = WP > WG + 1e-9 ? 1 : (WP < WG - 1e-9 ? -1 : 0);
  regime = (shatBval !== null && shatBval < sbar) ? 'II-a' : 'II-b';
  return { reg, WP, WG, WC, wC, xC, wGno, WGno,
           sigmaA, sigmaB, PiA, PiB, CA, aA, aB, sbar,
           regime, shatA, shatBval, xtilde };
}


function wmAxes() {
  return { xk: document.getElementById('xax').value, yk: document.getElementById('yax').value };
}

function buildSlidersWM() {
  const { xk, yk } = wmAxes();
  const d = document.getElementById('sldrs');
  d.innerHTML = '';
  ['beta', 'R', 'r', 'eta'].forEach(k => {
    if (k === xk || k === yk) return;
    const p = WM_PAX[k];
    const row = document.createElement('div');
    row.className = 'wm-slider-row';
    row.innerHTML =
      `<div class="wm-lbl"><span>${p.label}</span><span id="lb_${k}">${WM_F[k].toFixed(2)}</span></div>` +
      `<input type="range" id="sl_${k}" min="${p.min}" max="${p.max}" step="${p.step}" value="${WM_F[k]}">`;
    d.appendChild(row);
    row.querySelector('input').addEventListener('input', e => {
      WM_F[k] = parseFloat(e.target.value);
      document.getElementById('lb_' + k).textContent = WM_F[k].toFixed(2);
      drawWelfareMap();
    });
  });
}

function drawWelfareMap() {
  const { xk, yk } = wmAxes();
  const cv = document.getElementById('ph');
  const ctx = cv.getContext('2d');
  const CW = cv.width, CH = cv.height;
  const ml = 48, mb = 42, mt = 22, mr = 22;
  const pw = CW - ml - mr, ph = CH - mt - mb;
  const px = WM_PAX[xk], py = WM_PAX[yk];

  ctx.clearRect(0, 0, CW, CH);

  const img = ctx.createImageData(pw, ph);
  /* reg: 1=blue(WP>WG)  -1=amber(WG>WP)  0=grey(tie/A)  null=infeasible */
  const COLS = { null:[200,198,190,160], '-1':[239,159,39,215], '0':[136,135,128,185], '1':[55,138,221,215] };

  for (let j = 0; j < ph; j++) {
    for (let i = 0; i < pw; i++) {
      const xv = px.min + (i / (pw - 1)) * (px.max - px.min);
      const yv = py.max - (j / (ph - 1)) * (py.max - py.min);
      const a = { ...WM_F, [xk]: xv, [yk]: yv };
      const s = wm_solve(a.beta, a.R, a.r, a.eta, a.rb, a.rg);
      const c = s === null ? COLS['null'] : COLS[String(s.reg)];
      const idx = (j * pw + i) * 4;
      img.data[idx]=c[0]; img.data[idx+1]=c[1]; img.data[idx+2]=c[2]; img.data[idx+3]=c[3];
    }
  }
  const tmp = document.createElement('canvas');
  tmp.width = pw; tmp.height = ph;
  tmp.getContext('2d').putImageData(img, 0, 0);
  ctx.drawImage(tmp, ml, mt);

  /* Grid */
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 0.5;
  [1,2,3,4].forEach(i => {
    ctx.beginPath(); ctx.moveTo(ml+i/4*pw, mt); ctx.lineTo(ml+i/4*pw, mt+ph); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ml, mt+i/4*ph); ctx.lineTo(ml+pw, mt+i/4*ph); ctx.stroke();
  });
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
  ctx.strokeRect(ml, mt, pw, ph);

  /* BW boundary: w^B = w^G */
  {
    const bwPts = [];
    for (let i = 0; i < pw; i++) {
      const xv = px.min + (i / (pw - 1)) * (px.max - px.min);
      let prev = null, crossJ = null;
      for (let j = 0; j < ph; j++) {
        const yv = py.max - (j / (ph - 1)) * (py.max - py.min);
        const a = { ...WM_F, [xk]: xv, [yk]: yv };
        if (a.beta <= 0 || a.beta >= 1 || a.R <= 1 || a.r >= 1 ||
            a.R <= a.r || 1 - a.beta - a.eta <= 0) { prev = null; continue; }
        const CAb = a.r * (a.R - 1) * (a.R - 1) / (2 * (a.R - a.r));
        const diff = (a.R - 1) - (1 - a.beta - a.eta) / (2 * a.beta) - CAb;
        if (prev !== null && prev * diff < 0) { crossJ = j - diff / (diff - prev); break; }
        prev = diff;
      }
      bwPts.push(crossJ !== null ? { x: ml + i, y: mt + crossJ } : null);
    }
    ctx.save();
    ctx.setLineDash([5, 4]); ctx.lineCap = 'round';
    const drawBW = (style, lw) => {
      ctx.strokeStyle = style; ctx.lineWidth = lw;
      ctx.beginPath(); let on = false;
      bwPts.forEach(p => {
        if (!p) { on = false; return; }
        on ? ctx.lineTo(p.x, p.y) : (ctx.moveTo(p.x, p.y), (on = true));
      });
      ctx.stroke();
    };
    drawBW('rgba(0,0,0,0.3)', 3);
    drawBW('rgba(255,255,255,0.95)', 1.5);
    ctx.restore();
  }

  /* δ^G boundary: r > R/(2−β) — government accommodation threshold */
  {
    /* Step 1: scan for crossing points */
    const dgPts = [];
    for (let i = 0; i < pw; i++) {
      const xv = px.min + (i / (pw - 1)) * (px.max - px.min);
      let prev = null, crossJ = null;
      for (let j = 0; j < ph; j++) {
        const yv = py.max - (j / (ph - 1)) * (py.max - py.min);
        const a = { ...WM_F, [xk]: xv, [yk]: yv };
        if (a.beta <= 0 || a.beta >= 1 || a.R <= 1 || a.r >= 1) { prev = null; continue; }
        const diff = a.r * (2 - a.beta) - a.R;
        if (prev !== null && prev * diff < 0) { crossJ = j - diff / (diff - prev); break; }
        prev = diff;
      }
      dgPts.push(crossJ !== null ? { x: ml + i, y: mt + crossJ } : null);
    }

    /* Step 2: shade the accommodation region (r > δ^G) in green */
    ctx.save();
    ctx.beginPath(); ctx.rect(ml, mt, pw, ph); ctx.clip();
    ctx.fillStyle = 'rgba(60,200,100,0.18)';
    for (let i = 0; i < pw; i++) {
      const p = dgPts[i];
      if (p) {
        /* accommodation region is BELOW the crossing (lower β) */
        ctx.fillRect(p.x, p.y, 1, mt + ph - p.y);
      } else {
        /* no crossing — check if entire column is in accommodation region */
        const xv = px.min + (i / (pw - 1)) * (px.max - px.min);
        for (let j = 0; j < ph; j++) {
          const yv = py.max - (j / (ph - 1)) * (py.max - py.min);
          const a = { ...WM_F, [xk]: xv, [yk]: yv };
          if (a.beta <= 0 || a.beta >= 1 || a.R <= 1 || a.r >= 1) continue;
          if (a.r * (2 - a.beta) - a.R > 0) ctx.fillRect(ml + i, mt, 1, ph);
          break;
        }
      }
    }
    ctx.restore();

  }

  /* Axis tick labels */
  ctx.fillStyle = 'rgba(55,55,55,0.9)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    const xv = px.min + i/5 * (px.max - px.min);
    ctx.fillText(xv.toFixed(xv < 2 ? 2 : 1), ml + i/5*pw, mt+ph+17);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const yv = py.min + i/5 * (py.max - py.min);
    ctx.fillText(yv.toFixed(yv < 2 ? 2 : 1), ml-5, mt+ph - i/5*ph + 4);
  }
  ctx.fillStyle = 'rgba(35,35,35,0.9)'; ctx.font = '500 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(px.label, ml+pw/2, CH-6);
  ctx.save(); ctx.translate(12, mt+ph/2); ctx.rotate(-Math.PI/2); ctx.fillText(py.label, 0, 0); ctx.restore();

  /* Crosshair for clicked point */
  if (WM_CLICK) {
    const { cx, cy } = WM_CLICK;
    ctx.save();
    ctx.beginPath(); ctx.rect(ml, mt, pw, ph); ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(cx, mt); ctx.lineTo(cx, mt + ph);
    ctx.moveTo(ml, cy); ctx.lineTo(ml + pw, cy);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx, cy, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
    ctx.strokeStyle = 'rgba(20,20,20,0.65)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  }
}

function onAxisChangeWM() {
  const { xk, yk } = wmAxes();
  if (xk === yk) {
    const other = ['beta','R','r','eta'].find(v => v !== xk);
    document.getElementById(xk === 'R' ? 'yax' : 'xax').value = other;
  }
  buildSlidersWM(); drawWelfareMap();
}
document.getElementById('xax').addEventListener('change', onAxisChangeWM);
document.getElementById('yax').addEventListener('change', onAxisChangeWM);

['rb','rg'].forEach(k => {
  document.getElementById('sl_' + k).addEventListener('input', e => {
    WM_F[k] = parseFloat(e.target.value);
    document.getElementById('lb_' + k).textContent = WM_F[k].toFixed(2);
    drawWelfareMap();
  });
});

/* ── Click-to-inspect ────────────────────────────────────────── */
let WM_CLICK = null;

const REGIME_COLORS = {
  'I-a': '#7a7970', 'I-b': '#7a7970', 'I-c': '#7a7970',
  'II-a': '#c47e10', 'II-b': '#1f6fbd', 'Infeasible': '#aaa'
};
const REGIME_DESCS = {
  'I-a': 'Liquidation regime — corner σ*=0',
  'I-b': 'Liquidation regime — interior σ*=σ̂ᴵ',
  'I-c': 'Liquidation regime — corner σ*=σ̄⁻',
  'II-a': 'Renegotiation regime — constrained σ*=σ̄',
  'II-b': 'Renegotiation regime — interior σ*=σ̂ᴵᴵ',
  'Infeasible': 'Market does not exist'
};

function f3(v) { return (typeof v === 'number' && isFinite(v)) ? v.toFixed(3) : '—'; }
function f2(v) { return (typeof v === 'number' && isFinite(v)) ? v.toFixed(2) : '—'; }

function positionTip(tip, ex, ey) {
  tip.style.display = 'block';
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = ex + 18, top = ey - 10;
  if (left + tw > vw - 10) left = ex - tw - 18;
  if (top + th > vh - 10) top = vh - th - 10;
  if (top < 10) top = 10;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('wm-tip').style.display = 'none';
  WM_CLICK = null;
  drawWelfareMap();
}

function showTooltip(xk, yk, xv, yv, ex, ey) {
  const a = { ...WM_F, [xk]: xv, [yk]: yv };
  const s = wm_solve(a.beta, a.R, a.r, a.eta, a.rb, a.rg);
  const tip = document.getElementById('wm-tip');
  const regime = s ? s.regime : 'Infeasible';

  document.getElementById('tip-regime').style.color = REGIME_COLORS[regime] || '#888';
  document.getElementById('tip-regime').textContent = regime;
  document.getElementById('tip-desc').textContent = REGIME_DESCS[regime] || '';

  /* All four parameters */
  document.getElementById('tip-params').innerHTML =
    `<tr><td class="kl">β</td><td class="kv">${f3(a.beta)}</td>
         <td class="kl">R</td><td class="kv">${f3(a.R)}</td></tr>
     <tr><td class="kl">r</td><td class="kv">${f3(a.r)}</td>
         <td class="kl">η</td><td class="kv">${f3(a.eta)}</td></tr>`;

  if (!s) {
    document.getElementById('tip-eq').innerHTML = '';
    document.getElementById('tip-welfare').innerHTML = '';
    document.getElementById('tip-govt').innerHTML = '';
    positionTip(tip, ex, ey);
    return;
  }

  const choseB = s.PiB > s.PiA;
  const sigma  = choseB ? s.sigmaB : s.sigmaA;
  const xStar  = choseB ? 1 : s.xtilde;
  const dG     = a.R / (2 - a.beta);
  const govtOk = a.r > dG;

  document.getElementById('tip-eq').innerHTML =
    `<tr><td class="kl">σ*</td><td class="kv">${f3(sigma)}</td>
         <td class="kl">x*</td><td class="kv">${choseB ? '1' : f3(xStar)}</td></tr>
     <tr><td class="kl">σ̄</td><td class="kv">${f3(s.sbar)}</td></tr>`;

  const wpGap = s.WP - s.WG;
  const gapStr = Math.abs(wpGap) < 1e-6 ? '𝒲ᴾ = 𝒲ᴳ'
               : wpGap > 0 ? '𝒲ᴾ &gt; 𝒲ᴳ' : '𝒲ᴳ &gt; 𝒲ᴾ';
  document.getElementById('tip-welfare').innerHTML =
    `<tr><td class="kl">𝒲<sup>P</sup></td><td class="kv">${f3(s.WP)}</td>
         <td class="kl">𝒲<sup>G</sup></td><td class="kv">${f3(s.WG)}</td></tr>
     <tr><td colspan="4" style="font-size:11px;color:#888;padding-top:1px">${gapStr}</td></tr>`;

  const govtColor = govtOk ? '#1a9944' : '#cc3333';
  const govtText  = govtOk
    ? `r &gt; δᴳ=${f2(dG)} → govt <strong>intervenes</strong>`
    : `r ≤ δᴳ=${f2(dG)} → govt <strong>does not</strong> intervene`;
  document.getElementById('tip-govt').innerHTML =
    `<span style="color:${govtColor}">${govtText}</span>`;

  positionTip(tip, ex, ey);
}

document.getElementById('ph').addEventListener('click', e => {
  const cv = document.getElementById('ph');
  const rect = cv.getBoundingClientRect();
  const sx = cv.width / rect.width, sy = cv.height / rect.height;
  const cx = (e.clientX - rect.left) * sx;
  const cy = (e.clientY - rect.top)  * sy;
  const ml = 48, mb = 42, mt = 22, mr = 22;
  const pw = cv.width - ml - mr, ph = cv.height - mt - mb;

  if (cx < ml || cx > ml + pw || cy < mt || cy > mt + ph) {
    hideTooltip(); return;
  }

  const { xk, yk } = wmAxes();
  const pax = WM_PAX[xk], pay = WM_PAX[yk];
  const xv = pax.min + ((cx - ml) / pw) * (pax.max - pax.min);
  const yv = pay.max - ((cy - mt) / ph) * (pay.max - pay.min);

  WM_CLICK = { cx, cy };
  drawWelfareMap();
  showTooltip(xk, yk, xv, yv, e.clientX, e.clientY);
});

buildSlidersWM();
drawWelfareMap();
</script>
